app:
  title: CodeInsight Dev
  baseUrl: http://localhost:3000

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  database:
    client: better-sqlite3
    connection: ':memory:'
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  auth:
    dangerouslyDisableDefaultAuthPolicy: true

auth:
  providers:
    guest: {}

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

catalog:
  rules:
    - allow: [Component, API, Resource, System, Domain, Location]
  providers:
    github:
      jiteshy:
        organization: jiteshy
        catalogPath: /catalog-info.yaml
        filters:
          branch: main
        validateLocationsExist: false
        schedule:
          frequency: { minutes: 30 }
          timeout: { minutes: 3 }

codeinsight:
  cloneTempDir: /tmp/codeinsight-clones
  cloneTtlHours: 24
  features:
    docs: true
    diagrams: true
    qna: true
